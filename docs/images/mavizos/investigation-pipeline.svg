<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 280" role="img" aria-label="MavizOS investigation pipeline">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#58a6ff"/>
    </marker>
  </defs>
  <rect width="820" height="280" fill="#0d1117"/>
  <text x="410" y="28" fill="#e6edf3" font-family="Segoe UI, sans-serif" font-size="16" font-weight="600" text-anchor="middle">Investigation Pipeline</text>

  <rect x="40" y="55" width="100" height="55" rx="6" fill="#161b22" stroke="#f85149"/>
  <text x="90" y="78" fill="#f85149" font-size="11" text-anchor="middle" font-family="Segoe UI, sans-serif">Alert</text>
  <text x="90" y="95" fill="#8b949e" font-size="9" text-anchor="middle" font-family="Segoe UI, sans-serif">SIEM / EDR</text>

  <rect x="170" y="50" width="480" height="65" rx="6" fill="#161b22" stroke="#58a6ff" stroke-width="2"/>
