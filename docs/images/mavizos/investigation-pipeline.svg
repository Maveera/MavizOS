  <text x="410" y="92" fill="#8b949e" font-size="9" text-anchor="middle" font-family="Segoe UI, sans-serif">Triage � Enrich � Hunt � Analyze � Correlate � Decide � Remediate (gated) � Report</text>
  <text x="410" y="106" fill="#8b949e" font-size="9" text-anchor="middle" font-family="Segoe UI, sans-serif">Orchestrator delegates to 13 specialized SOC agents</text>

  <rect x="680" y="55" width="100" height="55" rx="6" fill="#161b22" stroke="#3fb950"/>
  <text x="730" y="78" fill="#3fb950" font-size="11" text-anchor="middle" font-family="Segoe UI, sans-serif">Report</text>
  <text x="730" y="95" fill="#8b949e" font-size="9" text-anchor="middle" font-family="Segoe UI, sans-serif">14 sections</text>

  <line x1="140" y1="82" x2="168" y2="82" stroke="#58a6ff" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="650" y1="82" x2="678" y2="82" stroke="#58a6ff" stroke-width="2" marker-end="url(#arr)"/>

  <text x="410" y="145" fill="#e6edf3" font-size="11" text-anchor="middle" font-family="Segoe UI, sans-serif">14-Section Structured Report</text>
  <rect x="60" y="160" width="700" height="95" rx="6" fill="#161b22" stroke="#30363d"/>
  <text x="90" y="182" fill="#8b949e" font-size="8" font-family="Segoe UI, sans-serif">Executive Summary</text>
  <text x="200" y="182" fill="#8b949e" font-size="8" font-family="Segoe UI, sans-serif">Timeline</text>
  <text x="280" y="182" fill="#8b949e" font-size="8" font-family="Segoe UI, sans-serif">IOCs</text>
  <text x="340" y="182" fill="#8b949e" font-size="8" font-family="Segoe UI, sans-serif">MITRE</text>
  <text x="400" y="182" fill="#8b949e" font-size="8" font-family="Segoe UI, sans-serif">Root Cause</text>
  <text x="490" y="182" fill="#8b949e" font-size="8" font-family="Segoe UI, sans-serif">Remediation</text>
  <text x="580" y="182" fill="#8b949e" font-size="8" font-family="Segoe UI, sans-serif">Lessons</text>
  <text x="660" y="182" fill="#8b949e" font-size="8" font-family="Segoe UI, sans-serif">Appendix</text>
  <text x="410" y="220" fill="#3fb950" font-size="10" text-anchor="middle" font-family="Segoe UI, sans-serif">Stored in MavizOS_fs/var/reports/  approval gates for destructive actions</text>
  <text x="410" y="238" fill="#8b949e" font-size="9" text-anchor="middle" font-family="Segoe UI, sans-serif">Audit log records every automated action</text>
