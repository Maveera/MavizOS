<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 220" role="img" aria-label="MavizOS ISO boot flow">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#58a6ff"/>
    </marker>
  </defs>
  <rect width="820" height="220" fill="#0d1117"/>
  <text x="410" y="28" fill="#e6edf3" font-family="Segoe UI, sans-serif" font-size="16" font-weight="600" text-anchor="middle">ISO Boot Flow</text>

  <rect x="40" y="55" width="120" height="50" rx="6" fill="#161b22" stroke="#58a6ff"/>
  <text x="100" y="78" fill="#58a6ff" font-size="10" text-anchor="middle" font-family="Segoe UI, sans-serif">build-iso.sh</text>
  <text x="100" y="93" fill="#8b949e" font-size="9" text-anchor="middle" font-family="Segoe UI, sans-serif">dist/*.iso</text>

  <rect x="190" y="55" width="110" height="50" rx="6" fill="#161b22" stroke="#58a6ff"/>
  <text x="245" y="78" fill="#58a6ff" font-size="10" text-anchor="middle" font-family="Segoe UI, sans-serif">ISO boot</text>
  <text x="245" y="93" fill="#8b949e" font-size="9" text-anchor="middle" font-family="Segoe UI, sans-serif">VM / USB</text>

  <rect x="330" y="55" width="130" height="50" rx="6" fill="#161b22" stroke="#3fb950"/>
  <text x="395" y="78" fill="#3fb950" font-size="10" text-anchor="middle" font-family="Segoe UI, sans-serif">Debian Live</text>
  <text x="395" y="93" fill="#8b949e" font-size="9" text-anchor="middle" font-family="Segoe UI, sans-serif">preseed + hooks</text>

  <rect x="490" y="55" width="140" height="50" rx="6" fill="#161b22" stroke="#3fb950"/>
  <text x="560" y="78" fill="#3fb950" font-size="10" text-anchor="middle" font-family="Segoe UI, sans-serif">/opt/MavizOS</text>
  <text x="560" y="93" fill="#8b949e" font-size="9" text-anchor="middle" font-family="Segoe UI, sans-serif">pre-installed</text>

  <rect x="660" y="55" width="130" height="50" rx="6" fill="#161b22" stroke="#3fb950"/>
  <text x="725" y="78" fill="#3fb950" font-size="10" text-anchor="middle" font-family="Segoe UI, sans-serif">SOC shell</text>
  <text x="725" y="93" fill="#8b949e" font-size="9" text-anchor="middle" font-family="Segoe UI, sans-serif">/desktop</text>

  <line x1="160" y1="80" x2="188" y2="80" stroke="#58a6ff" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="300" y1="80" x2="328" y2="80" stroke="#58a6ff" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="460" y1="80" x2="488" y2="80" stroke="#58a6ff" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="630" y1="80" x2="658" y2="80" stroke="#58a6ff" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="120" y="130" width="580" height="55" rx="6" fill="#161b22" stroke="#f0883e"/>
  <text x="410" y="152" fill="#f0883e" font-size="10" text-anchor="middle" font-family="Segoe UI, sans-serif">CAUTION: dd to USB overwrites target device  verify /dev/sdX</text>
  <text x="410" y="172" fill="#8b949e" font-size="10" text-anchor="middle" font-family="Segoe UI, sans-serif">Login: MavizOS user | http://127.0.0.1:8000/desktop</text>
</svg>
