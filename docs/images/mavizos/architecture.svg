<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 420" role="img" aria-label="MavizOS architecture">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#58a6ff"/>
    </marker>
  </defs>
  <rect width="820" height="420" fill="#0d1117"/>
  <text x="410" y="32" fill="#e6edf3" font-family="Segoe UI, system-ui, sans-serif" font-size="18" font-weight="600" text-anchor="middle">MavizOS Architecture</text>

  <!-- Host OS -->
  <rect x="40" y="55" width="740" height="70" rx="8" fill="url(#g1)" stroke="#30363d"/>
  <text x="410" y="78" fill="#8b949e" font-family="Segoe UI, sans-serif" font-size="11" text-anchor="middle">HOST OPERATING SYSTEM</text>
  <rect x="70" y="88" width="150" height="28" rx="4" fill="#21262d" stroke="#58a6ff"/>
  <text x="145" y="106" fill="#e6edf3" font-size="11" text-anchor="middle" font-family="Segoe UI, sans-serif">Windows 10/11</text>
  <rect x="250" y="88" width="150" height="28" rx="4" fill="#21262d" stroke="#58a6ff"/>
  <text x="325" y="106" fill="#e6edf3" font-size="11" text-anchor="middle" font-family="Segoe UI, sans-serif">Linux distro</text>
  <rect x="430" y="88" width="150" height="28" rx="4" fill="#21262d" stroke="#58a6ff"/>
  <text x="505" y="106" fill="#e6edf3" font-size="11" text-anchor="middle" font-family="Segoe UI, sans-serif">Debian Live ISO</text>

  <!-- Kernel layer -->
  <rect x="120" y="155" width="580" height="75" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="2"/>
  <text x="410" y="178" fill="#58a6ff" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" text-anchor="middle">MavizOS KERNEL LAYER</text>
  <rect x="145" y="188" width="110" height="30" rx="4" fill="#21262d" stroke="#3fb950"/>
  <text x="200" y="207" fill="#e6edf3" font-size="10" text-anchor="middle" font-family="Segoe UI, sans-serif">FastAPI serve</text>
  <rect x="275" y="188" width="110" height="30" rx="4" fill="#21262d" stroke="#3fb950"/>
  <text x="330" y="207" fill="#e6edf3" font-size="10" text-anchor="middle" font-family="Segoe UI, sans-serif">Shell REPL</text>
  <rect x="405" y="188" width="110" height="30" rx="4" fill="#21262d" stroke="#3fb950"/>
  <text x="460" y="207" fill="#e6edf3" font-size="10" text-anchor="middle" font-family="Segoe UI, sans-serif">Web /desktop</text>
  <rect x="535" y="188" width="110" height="30" rx="4" fill="#21262d" stroke="#3fb950"/>
  <text x="590" y="207" fill="#e6edf3" font-size="10" text-anchor="middle" font-family="Segoe UI, sans-serif">Virtual FS</text>

  <!-- Agents -->
  <rect x="120" y="260" width="280" height="70" rx="8" fill="#161b22" stroke="#3fb950"/>
  <text x="260" y="283" fill="#3fb950" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600" text-anchor="middle">AGENT PLANE</text>
  <text x="260" y="305" fill="#8b949e" font-size="10" text-anchor="middle" font-family="Segoe UI, sans-serif">Orchestrator + 13 SOC agents</text>
  <text x="260" y="320" fill="#8b949e" font-size="10" text-anchor="middle" font-family="Segoe UI, sans-serif">10-step investigation workflow</text>

  <!-- Integrations -->
  <rect x="420" y="260" width="280" height="70" rx="8" fill="#161b22" stroke="#f0883e"/>
  <text x="560" y="283" fill="#f0883e" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600" text-anchor="middle">INTEGRATIONS</text>
  <text x="560" y="305" fill="#8b949e" font-size="10" text-anchor="middle" font-family="Segoe UI, sans-serif">SIEM, EDR, SOAR adapters</text>
  <text x="560" y="320" fill="#8b949e" font-size="10" text-anchor="middle" font-family="Segoe UI, sans-serif">Demo mocks + production APIs</text>

  <!-- Arrows -->
  <line x1="410" y1="125" x2="410" y2="152" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="260" y1="230" x2="260" y2="257" stroke="#3fb950" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="560" y1="230" x2="560" y2="257" stroke="#3fb950" stroke-width="2" marker-end="url(#arrow)"/>

  <text x="410" y="395" fill="#8b949e" font-size="10" text-anchor="middle" font-family="Segoe UI, sans-serif">Appliance mode: host OS stays  MavizOS is the primary SOC experience</text>
</svg>
