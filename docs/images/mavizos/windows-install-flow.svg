<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" role="img" aria-label="MavizOS Windows install flow">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#58a6ff"/>
    </marker>
  </defs>
  <rect width="900" height="200" fill="#0d1117"/>
  <text x="450" y="28" fill="#e6edf3" font-family="Segoe UI, sans-serif" font-size="16" font-weight="600" text-anchor="middle">Windows Install Flow</text>

  <rect x="20" y="55" width="120" height="50" rx="6" fill="#161b22" stroke="#58a6ff"/>
  <text x="80" y="78" fill="#58a6ff" font-size="10" text-anchor="middle" font-family="Segoe UI, sans-serif">Download</text>
  <text x="80" y="93" fill="#8b949e" font-size="9" text-anchor="middle" font-family="Segoe UI, sans-serif">repo / zip</text>

  <rect x="170" y="55" width="120" height="50" rx="6" fill="#161b22" stroke="#58a6ff"/>
  <text x="230" y="78" fill="#58a6ff" font-size="10" text-anchor="middle" font-family="Segoe UI, sans-serif">install.ps1</text>
  <text x="230" y="93" fill="#8b949e" font-size="9" text-anchor="middle" font-family="Segoe UI, sans-serif">Admin PS</text>

  <rect x="320" y="55" width="130" height="50" rx="6" fill="#161b22" stroke="#3fb950"/>
  <text x="385" y="78" fill="#3fb950" font-size="10" text-anchor="middle" font-family="Segoe UI, sans-serif">C:\MavizOS</text>
  <text x="385" y="93" fill="#8b949e" font-size="9" text-anchor="middle" font-family="Segoe UI, sans-serif">venv + pip -e</text>

  <rect x="480" y="55" width="130" height="50" rx="6" fill="#161b22" stroke="#3fb950"/>
  <text x="545" y="78" fill="#3fb950" font-size="10" text-anchor="middle" font-family="Segoe UI, sans-serif">Autostart</text>
  <text x="545" y="93" fill="#8b949e" font-size="9" text-anchor="middle" font-family="Segoe UI, sans-serif">Scheduled task</text>

  <rect x="640" y="55" width="120" height="50" rx="6" fill="#161b22" stroke="#3fb950"/>
  <text x="700" y="78" fill="#3fb950" font-size="10" text-anchor="middle" font-family="Segoe UI, sans-serif">Shell</text>
  <text x="700" y="93" fill="#8b949e" font-size="9" text-anchor="middle" font-family="Segoe UI, sans-serif">MavizOS&gt;</text>

  <rect x="790" y="55" width="90" height="50" rx="6" fill="#161b22" stroke="#3fb950"/>
  <text x="835" y="78" fill="#3fb950" font-size="10" text-anchor="middle" font-family="Segoe UI, sans-serif">Desktop</text>
  <text x="835" y="93" fill="#8b949e" font-size="9" text-anchor="middle" font-family="Segoe UI, sans-serif">:8000</text>

  <line x1="140" y1="80" x2="168" y2="80" stroke="#58a6ff" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="290" y1="80" x2="318" y2="80" stroke="#58a6ff" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="450" y1="80" x2="478" y2="80" stroke="#58a6ff" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="610" y1="80" x2="638" y2="80" stroke="#58a6ff" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="760" y1="80" x2="788" y2="80" stroke="#58a6ff" stroke-width="2" marker-end="url(#arr)"/>

  <text x="450" y="155" fill="#8b949e" font-size="10" text-anchor="middle" font-family="Segoe UI, sans-serif">Non-destructive: Windows kernel and files remain untouched</text>
  <text x="450" y="175" fill="#3fb950" font-size="10" text-anchor="middle" font-family="Segoe UI, sans-serif">Optional: configure-appliance.ps1 for SOC kiosk hardening</text>
</svg>
