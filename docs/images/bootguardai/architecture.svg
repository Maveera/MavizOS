<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 400" role="img" aria-label="BootGuardAI architecture">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#58a6ff"/>
    </marker>
  </defs>
  <rect width="820" height="400" fill="#0d1117"/>
  <text x="410" y="32" fill="#e6edf3" font-family="Segoe UI, sans-serif" font-size="18" font-weight="600" text-anchor="middle">BootGuardAI Architecture</text>

  <rect x="40" y="55" width="740" height="65" rx="8" fill="url(#bg)" stroke="#30363d"/>
  <text x="410" y="78" fill="#8b949e" font-size="11" text-anchor="middle" font-family="Segoe UI, sans-serif">FIRMWARE &amp; BOOT CHAIN</text>
  <rect x="80" y="88" width="100" height="24" rx="4" fill="#21262d" stroke="#58a6ff"/>
  <text x="130" y="104" fill="#e6edf3" font-size="9" text-anchor="middle" font-family="Segoe UI, sans-serif">UEFI</text>
  <rect x="200" y="88" width="100" height="24" rx="4" fill="#21262d" stroke="#58a6ff"/>
  <text x="250" y="104" fill="#e6edf3" font-size="9" text-anchor="middle" font-family="Segoe UI, sans-serif">bootmgfw</text>
  <rect x="320" y="88" width="80" height="24" rx="4" fill="#21262d" stroke="#58a6ff"/>
  <text x="360" y="104" fill="#e6edf3" font-size="9" text-anchor="middle" font-family="Segoe UI, sans-serif">BCD</text>
  <rect x="420" y="88" width="80" height="24" rx="4" fill="#21262d" stroke="#58a6ff"/>
  <text x="460" y="104" fill="#e6edf3" font-size="9" text-anchor="middle" font-family="Segoe UI, sans-serif">GRUB</text>
  <rect x="520" y="88" width="100" height="24" rx="4" fill="#21262d" stroke="#58a6ff"/>
  <text x="570" y="104" fill="#e6edf3" font-size="9" text-anchor="middle" font-family="Segoe UI, sans-serif">Kernel</text>
  <rect x="640" y="88" width="100" height="24" rx="4" fill="#21262d" stroke="#58a6ff"/>
  <text x="690" y="104" fill="#e6edf3" font-size="9" text-anchor="middle" font-family="Segoe UI, sans-serif">Login</text>

  <rect x="120" y="150" width="580" height="80" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="2"/>
  <text x="410" y="175" fill="#58a6ff" font-size="12" font-weight="600" text-anchor="middle" font-family="Segoe UI, sans-serif">BOOTGUARD ANALYSIS STACK</text>
  <rect x="150" y="188" width="120" height="30" rx="4" fill="#21262d" stroke="#3fb950"/>
  <text x="210" y="207" fill="#e6edf3" font-size="10" text-anchor="middle" font-family="Segoe UI, sans-serif">Context collector</text>
  <rect x="290" y="188" width="120" height="30" rx="4" fill="#21262d" stroke="#3fb950"/>
  <text x="350" y="207" fill="#e6edf3" font-size="10" text-anchor="middle" font-family="Segoe UI, sans-serif">10-step engine</text>
  <rect x="430" y="188" width="120" height="30" rx="4" fill="#21262d" stroke="#3fb950"/>
  <text x="490" y="207" fill="#e6edf3" font-size="10" text-anchor="middle" font-family="Segoe UI, sans-serif">Agents + VFS</text>
  <rect x="570" y="188" width="100" height="30" rx="4" fill="#21262d" stroke="#3fb950"/>
  <text x="620" y="207" fill="#e6edf3" font-size="10" text-anchor="middle" font-family="Segoe UI, sans-serif">API :8081</text>

  <rect x="80" y="260" width="320" height="70" rx="8" fill="#161b22" stroke="#f0883e"/>
  <text x="240" y="283" fill="#f0883e" font-size="11" font-weight="600" text-anchor="middle" font-family="Segoe UI, sans-serif">SAFE MODE</text>
  <text x="240" y="305" fill="#8b949e" font-size="10" text-anchor="middle" font-family="Segoe UI, sans-serif">Read-only boot diagnostics</text>
  <text x="240" y="320" fill="#8b949e" font-size="10" text-anchor="middle" font-family="Segoe UI, sans-serif">Analyst approval for fixes</text>

  <rect x="420" y="260" width="320" height="70" rx="8" fill="#161b22" stroke="#3fb950"/>
  <text x="580" y="283" fill="#3fb950" font-size="11" font-weight="600" text-anchor="middle" font-family="Segoe UI, sans-serif">12-SECTION REPORT</text>
  <text x="580" y="305" fill="#8b949e" font-size="10" text-anchor="middle" font-family="Segoe UI, sans-serif">bootguardai_fs/var/reports/</text>
  <text x="580" y="320" fill="#8b949e" font-size="10" text-anchor="middle" font-family="Segoe UI, sans-serif">Separate from mavizos</text>

  <line x1="410" y1="120" x2="410" y2="147" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="410" y1="230" x2="240" y2="257" stroke="#f0883e" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="410" y1="230" x2="580" y2="257" stroke="#3fb950" stroke-width="2" marker-end="url(#arrow)"/>

  <text x="410" y="375" fill="#8b949e" font-size="10" text-anchor="middle" font-family="Segoe UI, sans-serif">Installs to C:\BootGuardAI or /opt/bootguardai  does not modify host boot files without approval</text>
</svg>
