<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 180" role="img" aria-label="Windows UEFI boot chain">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#58a6ff"/>
    </marker>
  </defs>
  <rect width="900" height="180" fill="#0d1117"/>
  <text x="450" y="28" fill="#e6edf3" font-family="Segoe UI, sans-serif" font-size="16" font-weight="600" text-anchor="middle">Windows UEFI Boot Chain</text>

  <rect x="15" y="55" width="90" height="45" rx="6" fill="#161b22" stroke="#58a6ff"/>
  <text x="60" y="82" fill="#58a6ff" font-size="10" text-anchor="middle" font-family="Segoe UI, sans-serif">POWER ON</text>

  <rect x="125" y="55" width="80" height="45" rx="6" fill="#161b22" stroke="#58a6ff"/>
  <text x="165" y="82" fill="#e6edf3" font-size="10" text-anchor="middle" font-family="Segoe UI, sans-serif">UEFI</text>

  <rect x="225" y="55" width="110" height="45" rx="6" fill="#161b22" stroke="#58a6ff"/>
  <text x="280" y="78" fill="#e6edf3" font-size="10" text-anchor="middle" font-family="Segoe UI, sans-serif">bootmgfw</text>
  <text x="280" y="92" fill="#8b949e" font-size="8" text-anchor="middle" font-family="Segoe UI, sans-serif">.efi</text>

  <rect x="355" y="55" width="70" height="45" rx="6" fill="#161b22" stroke="#58a6ff"/>
  <text x="390" y="82" fill="#e6edf3" font-size="10" text-anchor="middle" font-family="Segoe UI, sans-serif">BCD</text>

  <rect x="445" y="55" width="90" height="45" rx="6" fill="#161b22" stroke="#3fb950"/>
  <text x="490" y="82" fill="#3fb950" font-size="10" text-anchor="middle" font-family="Segoe UI, sans-serif">winload</text>

  <rect x="555" y="55" width="90" height="45" rx="6" fill="#161b22" stroke="#3fb950"/>
  <text x="600" y="82" fill="#3fb950" font-size="10" text-anchor="middle" font-family="Segoe UI, sans-serif">Kernel</text>

  <rect x="665" y="55" width="90" height="45" rx="6" fill="#161b22" stroke="#3fb950"/>
  <text x="710" y="82" fill="#3fb950" font-size="10" text-anchor="middle" font-family="Segoe UI, sans-serif">smss</text>

  <rect x="775" y="55" width="100" height="45" rx="6" fill="#161b22" stroke="#3fb950"/>
  <text x="825" y="82" fill="#3fb950" font-size="10" text-anchor="middle" font-family="Segoe UI, sans-serif">Login</text>

  <line x1="105" y1="77" x2="123" y2="77" stroke="#58a6ff" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="205" y1="77" x2="223" y2="77" stroke="#58a6ff" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="335" y1="77" x2="353" y2="77" stroke="#58a6ff" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="425" y1="77" x2="443" y2="77" stroke="#58a6ff" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="535" y1="77" x2="553" y2="77" stroke="#58a6ff" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="645" y1="77" x2="663" y2="77" stroke="#58a6ff" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="755" y1="77" x2="773" y2="77" stroke="#58a6ff" stroke-width="2" marker-end="url(#arr)"/>

  <text x="450" y="140" fill="#8b949e" font-size="10" text-anchor="middle" font-family="Segoe UI, sans-serif">BootGuardAI analyzes each stage  Secure Boot, BCD entries, driver load order</text>
  <text x="450" y="160" fill="#f0883e" font-size="10" text-anchor="middle" font-family="Segoe UI, sans-serif">Destructive BCD/boot fixes require analyst approval</text>
</svg>
