<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 180" role="img" aria-label="Linux UEFI boot chain">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#58a6ff"/>
    </marker>
  </defs>
  <rect width="780" height="180" fill="#0d1117"/>
  <text x="390" y="28" fill="#e6edf3" font-family="Segoe UI, sans-serif" font-size="16" font-weight="600" text-anchor="middle">Linux UEFI Boot Chain</text>

  <rect x="20" y="55" width="90" height="45" rx="6" fill="#161b22" stroke="#58a6ff"/>
  <text x="65" y="82" fill="#58a6ff" font-size="10" text-anchor="middle" font-family="Segoe UI, sans-serif">POWER ON</text>

  <rect x="130" y="55" width="80" height="45" rx="6" fill="#161b22" stroke="#58a6ff"/>
  <text x="170" y="82" fill="#e6edf3" font-size="10" text-anchor="middle" font-family="Segoe UI, sans-serif">UEFI</text>

  <rect x="230" y="55" width="100" height="45" rx="6" fill="#161b22" stroke="#58a6ff"/>
  <text x="280" y="82" fill="#e6edf3" font-size="10" text-anchor="middle" font-family="Segoe UI, sans-serif">GRUB2</text>

  <rect x="350" y="55" width="100" height="45" rx="6" fill="#161b22" stroke="#3fb950"/>
  <text x="400" y="78" fill="#3fb950" font-size="10" text-anchor="middle" font-family="Segoe UI, sans-serif">vmlinuz</text>
  <text x="400" y="92" fill="#8b949e" font-size="8" text-anchor="middle" font-family="Segoe UI, sans-serif">+ initrd</text>

  <rect x="470" y="55" width="100" height="45" rx="6" fill="#161b22" stroke="#3fb950"/>
  <text x="520" y="82" fill="#3fb950" font-size="10" text-anchor="middle" font-family="Segoe UI, sans-serif">Kernel</text>

  <rect x="590" y="55" width="100" height="45" rx="6" fill="#161b22" stroke="#3fb950"/>
  <text x="640" y="82" fill="#3fb950" font-size="10" text-anchor="middle" font-family="Segoe UI, sans-serif">systemd</text>

  <rect x="710" y="55" width="50" height="45" rx="6" fill="#161b22" stroke="#3fb950"/>
  <text x="735" y="82" fill="#3fb950" font-size="9" text-anchor="middle" font-family="Segoe UI, sans-serif">Login</text>

  <line x1="110" y1="77" x2="128" y2="77" stroke="#58a6ff" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="210" y1="77" x2="228" y2="77" stroke="#58a6ff" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="330" y1="77" x2="348" y2="77" stroke="#58a6ff" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="450" y1="77" x2="468" y2="77" stroke="#58a6ff" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="570" y1="77" x2="588" y2="77" stroke="#58a6ff" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="690" y1="77" x2="708" y2="77" stroke="#58a6ff" stroke-width="2" marker-end="url(#arr)"/>

  <text x="390" y="140" fill="#8b949e" font-size="10" text-anchor="middle" font-family="Segoe UI, sans-serif">BootGuardAI inspects GRUB config, kernel params, initramfs, failed units</text>
  <text x="390" y="160" fill="#3fb950" font-size="10" text-anchor="middle" font-family="Segoe UI, sans-serif">systemctl bootguardai.service on dedicated nodes</text>
</svg>
