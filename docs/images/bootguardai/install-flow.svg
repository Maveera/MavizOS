<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 260" role="img" aria-label="BootGuardAI install paths">
  <rect width="820" height="260" fill="#0d1117"/>
  <text x="410" y="28" fill="#e6edf3" font-family="Segoe UI, sans-serif" font-size="16" font-weight="600" text-anchor="middle">BootGuardAI Install Paths</text>

  <!-- Windows path -->
  <text x="140" y="55" fill="#58a6ff" font-size="11" font-weight="600" font-family="Segoe UI, sans-serif">Windows</text>
  <rect x="40" y="65" width="200" height="35" rx="4" fill="#161b22" stroke="#58a6ff"/>
  <text x="140" y="87" fill="#e6edf3" font-size="10" text-anchor="middle" font-family="Segoe UI, sans-serif">install.ps1 (Admin)</text>
  <text x="140" y="115" fill="#3fb950" font-size="10" text-anchor="middle" font-family="Segoe UI, sans-serif">ō</text>
  <rect x="40" y="125" width="200" height="35" rx="4" fill="#161b22" stroke="#3fb950"/>
  <text x="140" y="147" fill="#3fb950" font-size="10" text-anchor="middle" font-family="Segoe UI, sans-serif">C:\BootGuardAI</text>

  <!-- Linux path -->
  <text x="410" y="55" fill="#58a6ff" font-size="11" font-weight="600" font-family="Segoe UI, sans-serif">Linux</text>
  <rect x="310" y="65" width="200" height="35" rx="4" fill="#161b22" stroke="#58a6ff"/>
  <text x="410" y="87" fill="#e6edf3" font-size="10" text-anchor="middle" font-family="Segoe UI, sans-serif">install.sh (sudo)</text>
  <text x="410" y="115" fill="#3fb950" font-size="10" text-anchor="middle" font-family="Segoe UI, sans-serif">ō</text>
  <rect x="310" y="125" width="200" height="35" rx="4" fill="#161b22" stroke="#3fb950"/>
  <text x="410" y="147" fill="#3fb950" font-size="10" text-anchor="middle" font-family="Segoe UI, sans-serif">/opt/bootguardai</text>

  <!-- ISO path -->
  <text x="680" y="55" fill="#58a6ff" font-size="11" font-weight="600" font-family="Segoe UI, sans-serif">ISO Appliance</text>
  <rect x="580" y="65" width="200" height="35" rx="4" fill="#161b22" stroke="#58a6ff"/>
  <text x="680" y="87" fill="#e6edf3" font-size="10" text-anchor="middle" font-family="Segoe UI, sans-serif">build-iso.sh</text>
  <text x="680" y="115" fill="#3fb950" font-size="10" text-anchor="middle" font-family="Segoe UI, sans-serif">ō</text>
  <rect x="580" y="125" width="200" height="35" rx="4" fill="#161b22" stroke="#3fb950"/>
  <text x="680" y="147" fill="#3fb950" font-size="10" text-anchor="middle" font-family="Segoe UI, sans-serif">dist/*.iso</text>

  <rect x="120" y="185" width="580" height="55" rx="6" fill="#161b22" stroke="#30363d"/>
  <text x="410" y="208" fill="#e6edf3" font-size="10" text-anchor="middle" font-family="Segoe UI, sans-serif">All paths: pip install -e . | venv | API on port 8081 | bootguardai_fs VFS</text>
  <text x="410" y="228" fill="#8b949e" font-size="10" text-anchor="middle" font-family="Segoe UI, sans-serif">Non-destructive  host OS and boot files unchanged at install time</text>
</svg>
